name: Deploy to Vercel

# 任何 push 到 main 自动部署生产前端到 https://image.taostudioai.com/
# 也能在 GitHub Actions 页面手动触发（用于首次部署或重跑）
# 需要 3 个 repository secrets（见 docs/deploy-vercel.md）：
#   VERCEL_TOKEN      — vercel.com/account/tokens 创建，scope 选该项目
#   VERCEL_ORG_ID     — team_yLkWFllwHMElnHL2UPdCMrHO（来自 .vercel/project.json）
#   VERCEL_PROJECT_ID — prj_3YEQuSzkM4uqRJ3yCgrrFlXSIu8s

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.superpowers/**'
      - 'work/**'
      - 'output/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: vercel-production
  cancel-in-progress: false  # 部署不可中断，避免半成品

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      # 官方 vercel CLI 读这三个环境变量来认证和选项目
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install latest Vercel CLI
        # 直接用官方 vercel 包，避免第三方 action 捆绑旧版 CLI 导致版本过时
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        run: vercel --prod --yes --cwd=.
